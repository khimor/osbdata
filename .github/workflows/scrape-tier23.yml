name: Scrape Tier 2-3
on:
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: scrape-tier23
  cancel-in-progress: true

jobs:
  check-and-scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Check for source changes
        id: check
        run: python scripts/check_sources.py --tier 23

      - name: Run changed scrapers
        if: steps.check.outputs.changed_states != ''
        id: scrape
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: python scripts/run_states.py ${{ steps.check.outputs.changed_states }}

      - name: Sync data to dashboard
        if: steps.scrape.outputs.new_data == 'true'
        run: python scripts/sync_to_dashboard.py

      - name: Generate summary
        if: steps.scrape.outputs.new_data == 'true'
        run: python scripts/generate_summary.py ${{ steps.scrape.outputs.changed_states }}

      - name: Commit and push
        if: steps.scrape.outputs.new_data == 'true'
        run: |
          git config user.name "OSB Bot"
          git config user.email "bot@osbtracker.com"
          git add data/processed/ dashboard/public/data/ .source_hashes.json .source_check_times.json .state_watermarks.json
          git diff --cached --quiet || (git commit -m "data: tier 2-3 update $(date +%Y-%m-%d-%H%M)" && git pull --rebase origin main && git push)

      - name: Send email notifications
        if: steps.scrape.outputs.new_data == 'true'
        env:
          EMAIL_USERNAME: ${{ secrets.EMAIL_USERNAME }}
          EMAIL_PASSWORD: ${{ secrets.EMAIL_PASSWORD }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: python scripts/send_notifications.py
